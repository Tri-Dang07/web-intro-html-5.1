<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biểu Mẫu Nhập Họ Tên Hoàn Chỉnh</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #f9f9f9;
    }
    form {
      max-width: 400px;
      margin: 0 auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    fieldset {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
    }
    legend {
      font-weight: bold;
      color: #333;
      padding: 0 10px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 6px;
      color: #555;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    input[type="text"]:focus {
      border-color: #007bff;
      outline: none;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <form action="#" method="post">
    
    <fieldset>
      <legend>Thông Tin Thành Viên</legend>

      <div class="form-group">
        <label for="hoTen">Họ và tên của bạn:</label>
        <input 
          type="text" 
          id="hoTen" 
          name="hoTen" 
          placeholder="Ví dụ: Nguyễn Văn A" 
          required 
          minlength="2" 
          maxlength="50"
        >
      </div>
      
      <button type="submit">Xác Nhận Đăng Ký</button>
    </fieldset>

  </form>

  <script>
    // Đoạn script nhỏ kiểm tra sự kiện gửi form
    document.querySelector('form').addEventListener('submit', function(e) {
      const inputName = document.getElementById('hoTen').value;
      console.log("Dữ liệu họ tên chuẩn bị gửi lên server là: " + inputName);
    });
  </script>

</body>
</html>
